<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>정상을 향해 — 회원관리</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --g:#2d6a4f;--lg:#52b788;--pale:#d8f3dc;
  --bg:#f4f4ef;--card:#fff;--bd:#e8e8e3;
  --tx:#1b1b1b;--sub:#6b7280;--br:#5c3d2e;
  --blue:#1d4ed8;--pink:#db2777;--red:#dc2626;--yellow:#d97706;
}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}

/* ══ APP ══════════════════════════════════════════ */
#app{padding-bottom:72px}
header{
  position:sticky;top:0;z-index:50;height:54px;
  background:var(--g);display:flex;align-items:center;justify-content:space-between;padding:0 16px;
}
.h-logo{color:#fff;font-size:1.1rem;font-weight:700}
.h-lock{
  display:flex;align-items:center;gap:6px;
  color:rgba(255,255,255,.85);font-size:.8rem;
  border:1px solid rgba(255,255,255,.3);border-radius:20px;
  padding:5px 13px;background:transparent;transition:background .15s;white-space:nowrap;
}
.h-lock:hover{background:rgba(255,255,255,.15)}
.h-lock.unlocked{border-color:rgba(255,255,255,.6);color:#fff}

/* TAB BAR */
.tab-bar{
  position:sticky;top:54px;z-index:40;
  display:flex;background:var(--card);border-bottom:1px solid var(--bd);overflow-x:auto;
}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{
  flex:1;min-width:64px;padding:11px 4px 10px;font-size:.78rem;font-weight:600;
  color:var(--sub);border:none;background:transparent;border-bottom:3px solid transparent;
  transition:color .15s,border-color .15s;white-space:nowrap;
}
.tab-btn.on{color:var(--g);border-bottom-color:var(--g)}

/* PAGES */
.page{display:none;max-width:720px;margin:0 auto;padding:16px 14px}
.page.on{display:block}
.pg-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.pg-head h2{font-size:1rem;font-weight:700;color:var(--g)}

/* CARD */
.card{background:var(--card);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-ttl{font-size:.72rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;font-size:.85rem;font-weight:600;border:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-g{background:var(--g);color:#fff}
.btn-s{background:var(--pale);color:var(--g)}
.btn-r{background:#fee2e2;color:var(--red)}
.btn-y{background:#fef3c7;color:var(--yellow)}
.btn-sm{padding:5px 11px;font-size:.75rem;border-radius:6px}

/* ══ DASHBOARD ══════════════════════════════════ */
/* CALENDAR */
.cal-wrap{background:var(--card);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav h3{font-size:1rem;font-weight:700;color:var(--g)}
.cal-nav button{background:var(--pale);border:none;border-radius:8px;padding:6px 12px;color:var(--g);font-weight:700;font-size:.9rem}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:6px}
.cal-dow span{font-size:.7rem;font-weight:700;color:var(--sub);padding:4px 0}
.cal-dow span:first-child{color:#ef4444}
.cal-dow span:last-child{color:#3b82f6}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{min-height:52px;border-radius:8px;padding:4px 3px;position:relative;cursor:default}
.cal-cell.cur-month{background:#fafaf8}
.cal-cell.today{background:var(--pale)}
.cal-cell.today .cal-dn{font-weight:700;color:var(--g)}
.cal-cell.sun .cal-dn{color:#ef4444}
.cal-cell.sat .cal-dn{color:#3b82f6}
.cal-dn{font-size:.75rem;text-align:center;margin-bottom:2px}
.cal-ev{
  font-size:.62rem;background:var(--g);color:#fff;
  border-radius:3px;padding:1px 4px;margin-top:2px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  cursor:pointer;line-height:1.4;
}
.cal-ev:hover{background:var(--lg)}
.cal-ev.easy{background:#15803d}
.cal-ev.mid{background:#b45309}
.cal-ev.hard{background:#9f1239}
/* empty cells */
.cal-cell.empty{background:transparent;cursor:default}

/* RANKING */
.rank-row{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;border-radius:10px;background:var(--bg);margin-bottom:8px;
}
.rank-num{
  min-width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;font-weight:700;
}
.rk1{background:#fbbf24;color:#78350f}
.rk2{background:#9ca3af;color:#fff}
.rk3{background:#d97706;color:#fff}
.rk-else{background:var(--pale);color:var(--g)}
.rank-info{flex:1}
.rank-name{font-size:.9rem;font-weight:600}
.rank-sub{font-size:.72rem;color:var(--sub);margin-top:2px}
.rank-cnt{font-size:1.1rem;font-weight:700;color:var(--g)}

/* ══ ATTENDANCE ══════════════════════════════════ */
.att-box{background:var(--card);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.att-date-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.att-date-row label{font-size:.85rem;font-weight:600;color:var(--sub);white-space:nowrap}
.att-date-row input{border:1px solid var(--bd);border-radius:8px;padding:7px 12px;font-size:.9rem;color:var(--tx)}
.hike-info-box{background:linear-gradient(135deg,var(--g),var(--lg));border-radius:12px;padding:14px 18px;margin-bottom:16px;color:#fff}
.hike-info-box h3{font-size:1rem;font-weight:700;margin-bottom:4px}
.hike-info-box p{font-size:.82rem;opacity:.85}
.no-hike{text-align:center;color:var(--sub);padding:28px 0;font-size:.9rem}
.att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.att-member{
  border:2px solid var(--bd);border-radius:10px;padding:12px 10px;
  text-align:center;background:#fafaf8;cursor:pointer;transition:all .15s;
}
.att-member:hover{border-color:var(--lg)}
.att-member.checked{border-color:var(--g);background:var(--pale)}
.att-member .am-emoji{font-size:1.5rem;margin-bottom:4px}
.att-member .am-name{font-size:.85rem;font-weight:600}
.att-member .am-status{font-size:.7rem;margin-top:3px;color:var(--sub)}
.att-member.checked .am-status{color:var(--g);font-weight:600}

/* ══ MEMBERS ══════════════════════════════════── */
.search-bar{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:9px 14px;margin-bottom:14px;
}
.search-bar input{flex:1;border:none;outline:none;font-size:.9rem;background:transparent}
.mem-card{
  background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:10px;
  display:flex;align-items:center;gap:14px;box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;transition:box-shadow .15s;
}
.mem-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.1)}
.mem-avatar{width:46px;height:46px;border-radius:50%;background:var(--pale);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.mem-body{flex:1;min-width:0}
.mem-name{font-size:.95rem;font-weight:700}
.mem-name.blue{color:var(--blue)}
.mem-name.pink{color:var(--pink)}
.mem-meta{font-size:.75rem;color:var(--sub);margin-top:3px;line-height:1.5}
.mem-right{text-align:right;font-size:.75rem;color:var(--sub)}
.mem-right .savings{font-size:.88rem;font-weight:700;color:var(--g)}
.role-tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.7rem;font-weight:700}
.rt-leader{background:#fde68a;color:#78350f}
.rt-staff{background:#fef3c7;color:#92400e}
.rt-mem{background:var(--pale);color:var(--g)}
.status-badge{font-size:.68rem;padding:2px 7px;border-radius:10px;font-weight:600;margin-top:3px;display:inline-block}
.sb-blue{background:#dbeafe;color:var(--blue)}
.sb-pink{background:#fce7f3;color:var(--pink)}
.sb-ok{background:var(--pale);color:var(--g)}

/* ══ SAVINGS ══════════════════════════════════── */
.sav-card{
  background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:10px;
  display:flex;align-items:center;gap:14px;box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.sav-info{flex:1}
.sav-name{font-size:.92rem;font-weight:700;margin-bottom:3px}
.sav-meta{font-size:.73rem;color:var(--sub)}
.sav-bal{text-align:right}
.sav-amount{font-size:1.1rem;font-weight:700;color:var(--g)}
.sav-amount.low{color:var(--sub)}
.sav-usable{font-size:.7rem;margin-top:2px;font-weight:600}
.usable{color:var(--g)}.not-usable{color:var(--sub)}

/* ══ FEES ══════════════════════════════════════ */
.fee-summary{
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;
}
.fee-stat{background:var(--card);border-radius:12px;padding:16px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.fee-stat .fs-num{font-size:1.5rem;font-weight:700;color:var(--g)}
.fee-stat .fs-lbl{font-size:.72rem;color:var(--sub);margin-top:2px}
.fee-row{
  background:var(--card);border-radius:12px;padding:13px 16px;margin-bottom:8px;
  display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.fee-type{
  min-width:48px;height:24px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:.68rem;font-weight:700;
}
.ft-late{background:#fee2e2;color:var(--red)}
.ft-noshow{background:#fef3c7;color:var(--yellow)}
.ft-reset{background:#ede9fe;color:#7c3aed}
.ft-other{background:#e0f2fe;color:#0369a1}
.fee-body{flex:1}
.fee-body .fb-note{font-size:.85rem}
.fee-body .fb-meta{font-size:.72rem;color:var(--sub);margin-top:2px}
.fee-amt{font-size:.95rem;font-weight:700;color:var(--br)}
.del-btn{background:none;border:none;color:#ccc;font-size:1rem;padding:4px;line-height:1;border-radius:4px;transition:color .15s}
.del-btn:hover{color:var(--red)}

/* ══ MODALS ════════════════════════════════════ */
.overlay{
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.45);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.overlay.on{opacity:1;pointer-events:all}
.modal{
  background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:500px;
  padding:20px;max-height:90vh;overflow-y:auto;
  transform:translateY(60px);transition:transform .25s;
}
.overlay.on .modal{transform:translateY(0)}
.modal-title{font-size:1.05rem;font-weight:700;color:var(--g);margin-bottom:18px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:.78rem;font-weight:600;color:var(--sub);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.form-row input,.form-row select,.form-row textarea{
  width:100%;border:1px solid var(--bd);border-radius:8px;padding:10px 12px;font-size:.9rem;
  outline:none;color:var(--tx);background:#fff;transition:border-color .15s;
}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--lg)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.savings-hist{max-height:260px;overflow-y:auto;margin-top:8px}
.sh-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bd)}
.sh-row:last-child{border-bottom:none}
.sh-row .sh-note{font-size:.83rem}
.sh-row .sh-date{font-size:.72rem;color:var(--sub);margin-top:2px}
.sh-row .sh-amt{font-size:.9rem;font-weight:700}
.sh-row .sh-amt.pos{color:var(--g)}.sh-row .sh-amt.neg{color:var(--red)}
.bal-display{background:var(--pale);border-radius:10px;padding:14px;text-align:center;margin-bottom:14px}
.bal-display .bd-lbl{font-size:.75rem;color:var(--sub);margin-bottom:4px}
.bal-display .bd-num{font-size:1.8rem;font-weight:700;color:var(--g)}
.bal-display .bd-sub{font-size:.75rem;color:var(--sub);margin-top:2px}

/* CONFIRM */
.confirm-box{background:var(--card);border-radius:16px;width:calc(100% - 40px);max-width:340px;padding:24px;text-align:center}
.confirm-box h3{font-size:1rem;font-weight:700;margin-bottom:10px}
.confirm-box p{font-size:.85rem;color:var(--sub);margin-bottom:20px;line-height:1.5}
.confirm-box .cf-btns{display:flex;gap:8px}
.confirm-box .cf-btns button{flex:1}

/* TOAST */
#toast{
  position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1b1b1b;color:#fff;padding:10px 22px;border-radius:30px;
  font-size:.85rem;pointer-events:none;opacity:0;transition:all .25s;z-index:500;white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:400px){
  .fee-summary{grid-template-columns:1fr 1fr}
  .att-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
}
</style>
</head>
<body>

<!-- ══ APP ══════════════════════════════════════════ -->
<div id="app">
  <header>
    <div class="h-logo">🏔 정상을 향해</div>
    <button class="h-lock" id="lock-btn" onclick="toggleAdminLock()">🔒 관리자</button>
  </header>
  <nav class="tab-bar">
    <button class="tab-btn on"  onclick="sw('dashboard',this)">📋 대시보드</button>
    <button class="tab-btn"     onclick="sw('attendance',this)">✅ 출석체크</button>
    <button class="tab-btn"     onclick="sw('members',this)">👥 회원</button>
    <button class="tab-btn"     onclick="sw('savings',this)">💰 적립금</button>
    <button class="tab-btn"     onclick="sw('fees',this)">📊 회비</button>
  </nav>

  <!-- DASHBOARD -->
  <div class="page on" id="page-dashboard">
    <div class="cal-wrap">
      <div class="cal-nav">
        <button onclick="cm(-1)">◀</button>
        <h3 id="cal-title"></h3>
        <button onclick="cm(1)">▶</button>
      </div>
      <div class="cal-dow"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div class="card" style="margin-bottom:0">
        <div class="card-ttl">이번달 TOP 10</div>
        <div id="ranking-month"></div>
      </div>
      <div class="card" style="margin-bottom:0">
        <div class="card-ttl">올해 TOP 10</div>
        <div id="ranking-year"></div>
      </div>
    </div>
  </div>

  <!-- ATTENDANCE -->
  <div class="page" id="page-attendance">
    <div class="att-box">
      <div class="att-date-row">
        <label>산행 날짜</label>
        <input type="date" id="att-date" onchange="renderAttendance()"/>
        <button class="btn btn-g btn-sm" onclick="openAddHike()">+ 산행추가</button>
      </div>
      <div id="att-hike"></div>
    </div>
    <div id="att-search-wrap" style="display:none;margin-bottom:4px">
      <div class="search-bar">
        <span style="color:var(--sub)">🔍</span>
        <input id="att-search" type="text" placeholder="이름 검색…" oninput="filterAttMembers()"/>
      </div>
    </div>
    <div id="att-members"></div>
  </div>

  <!-- MEMBERS -->
  <div class="page" id="page-members">
    <div class="pg-head">
      <h2>회원 목록 <span id="mem-count" style="font-size:.8rem;color:var(--sub)"></span></h2>
      <button class="btn btn-g btn-sm" onclick="openMember()">+ 회원 추가</button>
    </div>
    <div class="search-bar">
      <span style="color:var(--sub)">🔍</span>
      <input id="mem-search" type="text" placeholder="이름으로 검색…" oninput="renderMembers()"/>
    </div>
    <div id="member-list"></div>
    <div style="margin-top:12px;font-size:.75rem;color:var(--sub);line-height:1.7;background:var(--card);border-radius:10px;padding:12px 14px">
      <b style="color:var(--blue)">■ 파랑</b>: 가입 후 1개월 이내이지만 아직 참석 이력 없음 &nbsp;
      <b style="color:var(--pink)">■ 분홍</b>: 마지막 참석으로부터 2개월 이상 경과
    </div>
  </div>

  <!-- SAVINGS -->
  <div class="page" id="page-savings">
    <div class="pg-head">
      <h2>개인별 적립금</h2>
      <button class="btn btn-y btn-sm" onclick="yearEndReset()">연말 정산</button>
    </div>
    <div style="font-size:.75rem;color:var(--sub);background:var(--card);border-radius:10px;padding:10px 14px;margin-bottom:14px;line-height:1.7">
      · 산행 참석 1회당 <b>+1,000원</b> 자동 적립 &nbsp; · 잔액 <b>5,000원 이상</b>부터 사용 가능 &nbsp; · 연말 미사용 적립금은 회비로 이월
    </div>
    <div id="savings-list"></div>
  </div>

  <!-- FEES -->
  <div class="page" id="page-fees">
    <div class="pg-head"><h2>회비 관리</h2><button class="btn btn-g btn-sm" onclick="openFee()">+ 회비 추가</button></div>
    <div class="fee-summary" id="fee-summary"></div>
    <div class="card-ttl" style="padding:0 2px;margin-bottom:8px">항목 내역</div>
    <div id="fee-list"></div>
  </div>
</div>

<!-- ══ MODALS ════════════════════════════════════════ -->
<!-- 산행 추가/수정 -->
<div class="overlay" id="ov-hike" onclick="closeOv('ov-hike',event)">
  <div class="modal">
    <div class="modal-title" id="hike-modal-title">산행 일정 추가</div>
    <input type="hidden" id="hike-id"/>
    <div class="form-row"><label>날짜</label><input type="date" id="hike-date"/></div>
    <div class="form-row"><label>산 이름</label><input type="text" id="hike-name" placeholder="예: 북한산 백운대"/></div>
    <div class="form-row"><label>장소</label><input type="text" id="hike-loc" placeholder="예: 서울 강북구"/></div>
    <div class="form-row"><label>난이도</label>
      <select id="hike-lvl">
        <option value="easy">초급</option>
        <option value="mid" selected>중급</option>
        <option value="hard">고급</option>
      </select>
    </div>
    <div class="form-row"><label>메모</label><textarea id="hike-note" rows="2" placeholder="특이사항 (선택)"></textarea></div>
    <div class="form-actions" id="hike-actions">
      <button class="btn btn-s" onclick="closeOv('ov-hike')">취소</button>
      <button class="btn btn-g" onclick="saveHike()">저장</button>
    </div>
  </div>
</div>

<!-- 회원 추가/수정 -->
<div class="overlay" id="ov-member" onclick="closeOv('ov-member',event)">
  <div class="modal">
    <div class="modal-title" id="mem-modal-title">회원 추가</div>
    <input type="hidden" id="mem-id"/>
    <div class="form-row"><label>이름</label><input type="text" id="mem-name" placeholder="이름"/></div>
    <div class="form-row"><label>생년월일</label><input type="date" id="mem-birth"/></div>
    <div class="form-row"><label>가입날짜</label><input type="date" id="mem-join"/></div>
    <div class="form-row"><label>역할</label>
      <select id="mem-role">
        <option>모임장</option><option>운영진</option><option selected>회원</option>
      </select>
    </div>
    <div class="form-actions" id="mem-actions">
      <button class="btn btn-s" onclick="closeOv('ov-member')">취소</button>

<script>

const ADMIN_PW = '8383123';   // ← 관리자 비밀번호
const KEY = 'hiking_v3';

// ════════════════════════════════════════════════════

// ════════════════════════════════════════════════════

// ════════════════════════════════════════════════════

function loadData() {

function saveData() { localStorage.setItem(KEY, JSON.stringify(D)); }

// ── SAVINGS HELPERS ──

// 특정 연도의 잔액 계산 (earn - used, 해당 연도 범위만)
function getSavingsBalanceForYear(memberId, year) {
  const ys = `${year}-01-01`, ye = `${year}-12-31`;
  const earned = D.attendances.filter(a=>a.memberId===memberId && a.date>=ys && a.date<=ye).length * 1000;
  const used   = D.savingsUse.filter(s=>s.memberId===memberId && s.date>=ys && s.date<=ye).reduce((sum,s)=>sum+s.amount,0);
  return Math.max(0, earned - used);
}

// 올해 잔액
function getSavingsBalance(memberId) {
  return getSavingsBalanceForYear(memberId, new Date().getFullYear());
}

// 전체 내역 (연도 무관, 최신순)
function getSavingsHistoryFull(memberId) {
  const hike = id => D.hikes.find(h=>h.id===id);
  const earns = D.attendances
    .filter(a=>a.memberId===memberId)
    .map(a=>({ date:a.date, note:`${hike(a.hikeId)?.name||'산행'} 참석`, amount:+1000 }));
  const uses = D.savingsUse
    .filter(s=>s.memberId===memberId)
    .map(s=>({ date:s.date, note:s.note||'적립금 사용', amount:-s.amount }));
  return [...earns,...uses].sort((a,b)=>b.date.localeCompare(a.date));
}

// ── YEAR-END CARRYOVER ──

// 특정 연도 실제 이월 처리 (중복 방지: processedYears 확인)
function processYearEnd(year) {
  if (!D.processedYears) D.processedYears = [];
  if (D.processedYears.includes(year)) return 0;
  let total = 0;
  D.members.forEach(m => {
    const bal = getSavingsBalanceForYear(m.id, year);
    if (bal > 0) {
      D.fees.push({id:uid(), memberId:m.id, date:`${year}-12-31`, amount:bal,
        type:'savings_reset', note:`${m.name} ${year}년 미사용 적립금 이월`});
      D.savingsUse.push({id:uid(), memberId:m.id, date:`${year}-12-31`, amount:bal,
        note:`${year}년 연말 이월 (자동)`});
      total += bal;
    }
  });
  D.processedYears.push(year);
  return total;
}

// 페이지 로드 시: 전년도 이월이 안 됐으면 자동 처리
function autoYearEndCarryover() {
  if (!D.processedYears) D.processedYears = [];
  const prevYear = new Date().getFullYear() - 1;
  // 앱 시작 연도(2019)부터 전년도까지 순서대로 미처리 연도만 처리
  let changed = false;
  for (let y = 2019; y <= prevYear; y++) {
    if (D.processedYears.includes(y)) continue;
    const hasAtt = D.attendances.some(a=>a.date.startsWith(`${y}-`));
    if (!hasAtt) { D.processedYears.push(y); changed = true; continue; }
    const n = processYearEnd(y);
    if (n > 0) changed = true;
  }
  if (changed) saveData();
}

// ── MEMBER STATUS ──
function getMemberStatus(m) {
  const t = today();
  const sinceJoin = daysDiff(m.joinDate, t);
  const atts = D.attendances.filter(a=>a.memberId===m.id);
  if (atts.length === 0) {
    if (sinceJoin <= 30) return 'blue';
    return 'pink';
  }
  const lastDate = atts.map(a=>a.date).sort().at(-1);
  if (daysDiff(lastDate, t) > 60) return 'pink';
  return 'ok';
}

function getAttCount(memberId) {
  return D.attendances.filter(a=>a.memberId===memberId).length;
}

// ── SEED REAL MEMBERS ──
function seedMembers() {
  const seeds = [
    {name:'박현주', birthdate:'1987-07-20', joinDate:'2021-04-05'},
    {name:'이승기', birthdate:'1987-01-05', joinDate:'2021-08-09'},

    {name:'이광호', birthdate:'1986-12-02', joinDate:'2022-09-13'},
    {name:'김상훈', birthdate:'1990-01-12', joinDate:'2022-09-17'},

  let changed = false;
  seeds.forEach(s => {
    if (!D.members.find(m=>m.name===s.name)) {
      D.members.push({id:uid(), name:s.name, birthdate:s.birthdate, joinDate:s.joinDate, role:'회원', emoji:EMOJIS[D.members.length % EMOJIS.length]});
      changed = true;
    }
  });
  if (changed) saveData();
}

// ════════════════════════════════════════════════════
//  ADMIN AUTH
// ════════════════════════════════════════════════════
let adminPending = null;

function isAdmin() { return sessionStorage.getItem('admin')==='1'; }

function requireAdmin(cb) {
  if (isAdmin()) { cb(); return; }
  adminPending = cb;
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-err').textContent = '';
  openOv('ov-pw');
  setTimeout(()=>document.getElementById('pw-input').focus(), 200);
}

function checkAdminPw() {
  const val = document.getElementById('pw-input').value;
  if (val === ADMIN_PW) {
    sessionStorage.setItem('admin','1');
    closeOv('ov-pw');
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-err').textContent = '';
    updateLockBtn();
    toast('🔓 관리자 모드가 활성화되었습니다.');

    document.getElementById('pw-err').textContent = '비밀번호가 올바르지 않습니다.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();

}

function toggleAdminLock() {
  if (isAdmin()) {
    sessionStorage.removeItem('admin');
    updateLockBtn();
    toast('🔒 관리자 모드가 잠금되었습니다.');

    requireAdmin(()=>{});

function updateLockBtn() {
  const btn = document.getElementById('lock-btn');

let curTab = 'dashboard';
function sw(tab, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));

function renderDashboard() { renderCalendar(); renderRanking(); }

function cm(dir) { calM+=dir; if(calM>11){calM=0;calY++;}else if(calM<0){calM=11;calY--;} renderCalendar(); }

function renderCalendar() {
  const ms = ym(calY,calM);
  document.getElementById('cal-title').textContent = `${calY}년 ${calM+1}월`;
  const first = new Date(calY,calM,1);
  const last  = new Date(calY,calM+1,0);
  const hikes = D.hikes.filter(h=>h.date.startsWith(ms));
  const t = today();
  let html = '';
  // blank leading cells
  for(let i=0;i<first.getDay();i++) html+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=last.getDate();d++){
    const ds = `${ms}-${String(d).padStart(2,'0')}`;
    const dow = new Date(calY,calM,d).getDay();
    const dayHikes = hikes.filter(h=>h.date===ds);
    const isToday = ds===t;
    const sunCls = dow===0?' sun':dow===6?' sat':'';
    html += `<div class="cal-cell cur-month${isToday?' today':''}${sunCls}">
      <div class="cal-dn">${d}</div>
      ${dayHikes.slice(0,3).map(h=>`<div class="cal-ev ${LV[h.level].cls}" onclick="showHikeDetail('${h.id}')" title="${h.name}">${h.name}</div>`).join('')}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}

function renderRanking() {
  const now = new Date();
  const y = now.getFullYear();
  const ymStr = `${y}-${String(now.getMonth()+1).padStart(2,'0')}`;

  function makeRankHtml(scored, emptyMsg) {
    if (!scored.length) return `<div style="text-align:center;color:var(--sub);padding:14px;font-size:.8rem">${emptyMsg}</div>`;
    return scored.map((item,i)=>{
      const rk = i===0?'rk1':i===1?'rk2':i===2?'rk3':'rk-else';
      const st = getMemberStatus(item.m);
      const nc = st==='blue'?'color:var(--blue)':st==='pink'?'color:var(--pink)':'';
      return `<div class="rank-row" style="padding:7px 8px;gap:7px">
        <div class="rank-num ${rk}" style="min-width:22px;height:22px;font-size:.7rem">${i+1}</div>
        <div class="rank-info">
          <div class="rank-name" style="font-size:.82rem;${nc}">${item.m.emoji} ${item.m.name}</div>
        </div>
        <div class="rank-cnt" style="font-size:.9rem">${item.cnt}회</div>
      </div>`;
    }).join('');
  }

  const monthScored = D.members.map(m=>({
    m, cnt: D.attendances.filter(a=>a.memberId===m.id && a.date.startsWith(ymStr)).length
  })).filter(x=>x.cnt>0).sort((a,b)=>b.cnt-a.cnt).slice(0,10);

  const yearScored = D.members.map(m=>({
    m, cnt: D.attendances.filter(a=>a.memberId===m.id && a.date.startsWith(`${y}-`)).length
  })).sort((a,b)=>b.cnt-a.cnt).slice(0,10);

  document.getElementById('ranking-month').innerHTML = makeRankHtml(monthScored, '이번달 참석 없음');
  document.getElementById('ranking-year').innerHTML  = makeRankHtml(yearScored,  '올해 참석 없음');
}

    document.getElementById('att-members').innerHTML = '';
    searchWrap.style.display = 'none';
    document.getElementById('att-search').value = '';
    attHikeId = null;
    return;
  }

  if (!attHikeId || !hikes.find(h=>h.id===attHikeId)) attHikeId = hikes[0].id;
  const hike = hikes.find(h=>h.id===attHikeId);

  const selectorHtml = hikes.length > 1
    ? `<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
        ${hikes.map(h=>`<button onclick="selectAttHike('${h.id}')"
          style="padding:5px 14px;border-radius:20px;border:2px solid ${h.id===attHikeId?'var(--g)':'var(--bd)'};
          background:${h.id===attHikeId?'var(--pale)':'#fff'};color:${h.id===attHikeId?'var(--g)':'var(--sub)'};
          font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit">${h.name}</button>`).join('')}
       </div>`
    : '';

  document.getElementById('att-hike').innerHTML = selectorHtml + `
    <div class="hike-info-box">
      <h3>${hike.name}</h3>
      <p>📍 ${hike.location} &nbsp;·&nbsp; ${LV[hike.level].label} &nbsp;·&nbsp; ${fmt(hike.date)}
         &nbsp;<button onclick="editHike('${hike.id}')" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:6px;padding:2px 8px;font-size:.72rem;cursor:pointer">수정</button>
      </p>
    </div>`;

  searchWrap.style.display = '';
  renderAttMemberGrid(hike);
}

function selectAttHike(hikeId) {
  attHikeId = hikeId;
  document.getElementById('att-search').value = '';
  renderAttendance();
}

function filterAttMembers() {
  const hike = D.hikes.find(h=>h.id===attHikeId);
  if (hike) renderAttMemberGrid(hike);
}

function renderAttMemberGrid(hike) {
  const q = document.getElementById('att-search').value.trim();
  const attended = new Set(D.attendances.filter(a=>a.hikeId===hike.id).map(a=>a.memberId));
  const filtered = q ? D.members.filter(m=>m.name.includes(q)) : D.members;

  const html = `<div class="card">
    <div class="card-ttl">출석 체크 (${attended.size}/${D.members.length}명)${q && filtered.length !== D.members.length ? ` · 검색결과 ${filtered.length}명` : ''}</div>
    <div class="att-grid">
      ${filtered.length ? filtered.map(m=>{
        const on = attended.has(m.id);
        return `<div class="att-member${on?' checked':''}" onclick="toggleAtt('${m.id}','${hike.id}')">
          <div class="am-emoji">${m.emoji}</div>
          <div class="am-name">${m.name}</div>
          <div class="am-status">${on?'✅ 출석':'—'}</div>
        </div>`;
      }).join('') : '<div style="text-align:center;color:var(--sub);padding:20px;font-size:.88rem">검색 결과 없음</div>'}
    </div>
  </div>`;
  document.getElementById('att-members').innerHTML = html;
}

function toggleAtt(memberId, hikeId) {
  requireAdmin(()=>{
    const hike = D.hikes.find(h=>h.id===hikeId);
    const existing = D.attendances.find(a=>a.memberId===memberId && a.hikeId===hikeId);
    if (existing) {
      D.attendances = D.attendances.filter(a=>a.id!==existing.id);
      toast('출석 취소되었습니다.');
    } else {
      D.attendances.push({id:uid(), hikeId, memberId, date: hike.date});
      toast('출석 체크 ✅  적립금 +1,000원');
    }
    saveData();
    renderAttendance();
    if (curTab==='dashboard') renderRanking();
  });
}

// ════════════════════════════════════════════════════
//  MEMBERS
// ════════════════════════════════════════════════════
function renderMembers() {
  const q = document.getElementById('mem-search').value.trim();
  const list = q ? D.members.filter(m=>m.name.includes(q)) : D.members;
  document.getElementById('mem-count').textContent = `(총 ${D.members.length}명)`;

  if (!list.length) {
    document.getElementById('member-list').innerHTML = '<div style="text-align:center;color:var(--sub);padding:30px">검색 결과 없음</div>';
    return;
  }

  document.getElementById('member-list').innerHTML = list.map(m=>{
    const st = getMemberStatus(m);
    const nc = st==='blue'?'blue':st==='pink'?'pink':'';
    const badge = st==='blue'
      ? `<span class="status-badge sb-blue">신규주의</span>`
      : st==='pink'
      ? `<span class="status-badge sb-pink">장기미참석</span>`
      : `<span class="status-badge sb-ok">활동중</span>`;
    const cnt  = getAttCount(m.id);
    const bal  = getSavingsBalance(m.id);
    const roleCls = m.role==='모임장'?'rt-leader':m.role==='운영진'?'rt-staff':'rt-mem';
    return `<div class="mem-card" onclick="openMember('${m.id}')">
      <div class="mem-avatar">${m.emoji}</div>
      <div class="mem-body">
        <div class="mem-name${nc?' '+nc:''}">${m.name}</div>
        <div class="mem-meta">
          생년월일 ${fmt(m.birthdate)} · 가입 ${fmt(m.joinDate)}<br>
          총 참석 ${cnt}회 ${badge}
        </div>
      </div>
      <div class="mem-right">
        <div class="role-tag ${roleCls}">${m.role}</div>
        <div class="savings">${won(bal)}</div>
        <div style="font-size:.68rem;color:var(--sub)">적립금</div>
      </div>
    </div>`;
  }).join('');
}

function openMember(id) {
  const m = id ? D.members.find(x=>x.id===id) : null;
  document.getElementById('mem-modal-title').textContent = m ? '회원 수정' : '회원 추가';
  document.getElementById('mem-id').value    = m?.id    || '';
  document.getElementById('mem-name').value  = m?.name  || '';
  document.getElementById('mem-birth').value = m?.birthdate || '';
  document.getElementById('mem-join').value  = m?.joinDate  || today();
  document.getElementById('mem-role').value  = m?.role  || '회원';
  const acts = document.getElementById('mem-actions');
  acts.innerHTML = m
    ? `<button class="btn btn-r btn-sm" onclick="deleteMember('${m.id}')">삭제</button>
       <button class="btn btn-s" onclick="closeOv('ov-member')">취소</button>
       <button class="btn btn-g" onclick="saveMember()">저장</button>`
    : `<button class="btn btn-s" onclick="closeOv('ov-member')">취소</button>
       <button class="btn btn-g" onclick="saveMember()">저장</button>`;
  openOv('ov-member');
}

function saveMember() {
  const id   = document.getElementById('mem-id').value;
  const name = document.getElementById('mem-name').value.trim();
  const birth= document.getElementById('mem-birth').value;
  const join = document.getElementById('mem-join').value;
  const role = document.getElementById('mem-role').value;
  if (!name||!birth||!join) { toast('이름, 생년월일, 가입날짜를 입력하세요'); return; }
  requireAdmin(()=>{
    if (id) {
      const m = D.members.find(x=>x.id===id);
      Object.assign(m, {name,birthdate:birth,joinDate:join,role});
    } else {
      const emoji = EMOJIS[D.members.length % EMOJIS.length];
      D.members.push({id:uid(),name,birthdate:birth,joinDate:join,role,emoji});
    }
    saveData(); closeOv('ov-member'); renderMembers();
    if(curTab==='dashboard') renderRanking();
    toast(id ? '회원 정보가 수정되었습니다.' : '새 회원이 추가되었습니다.');
  });
}

function deleteMember(id) {
  requireAdmin(()=>{
    confirm2('회원 삭제', '해당 회원과 모든 출석·적립금 내역이 삭제됩니다. 계속하시겠습니까?', ()=>{
      D.members     = D.members.filter(m=>m.id!==id);
      D.attendances = D.attendances.filter(a=>a.memberId!==id);
      D.savingsUse  = D.savingsUse.filter(s=>s.memberId!==id);
      D.fees        = D.fees.filter(f=>f.memberId!==id);
      saveData(); closeOv('ov-member'); renderMembers(); toast('회원이 삭제되었습니다.');
    });
  });
}

// ════════════════════════════════════════════════════
//  HIKE CRUD
// ════════════════════════════════════════════════════
function openAddHike(date) {
  document.getElementById('hike-modal-title').textContent = '산행 일정 추가';
  document.getElementById('hike-id').value   = '';
  document.getElementById('hike-date').value = date || document.getElementById('att-date').value || today();
  document.getElementById('hike-name').value = '';
  document.getElementById('hike-loc').value  = '';
  document.getElementById('hike-lvl').value  = 'mid';
  document.getElementById('hike-note').value = '';
  document.getElementById('hike-actions').innerHTML =
    `<button class="btn btn-s" onclick="closeOv('ov-hike')">취소</button>
     <button class="btn btn-g" onclick="saveHike()">저장</button>`;
  openOv('ov-hike');
}

function editHike(id) {
  const h = D.hikes.find(x=>x.id===id); if(!h) return;
  document.getElementById('hike-modal-title').textContent = '산행 수정';
  document.getElementById('hike-id').value   = h.id;
  document.getElementById('hike-date').value = h.date;
  document.getElementById('hike-name').value = h.name;
  document.getElementById('hike-loc').value  = h.location;
  document.getElementById('hike-lvl').value  = h.level;
  document.getElementById('hike-note').value = h.notes||'';
  document.getElementById('hike-actions').innerHTML =
    `<button class="btn btn-r btn-sm" onclick="deleteHike('${h.id}')">삭제</button>
     <button class="btn btn-s" onclick="closeOv('ov-hike')">취소</button>
     <button class="btn btn-g" onclick="saveHike()">저장</button>`;
  openOv('ov-hike');
}

function deleteHike(id) {
  const h = D.hikes.find(x=>x.id===id); if(!h) return;
  requireAdmin(()=>{
    const attCnt = D.attendances.filter(a=>a.hikeId===id).length;
    const msg = attCnt > 0
      ? `"${h.name}" 산행을 삭제하면 출석 기록 ${attCnt}건과 해당 적립금도 함께 삭제됩니다. 계속하시겠습니까?`
      : `"${h.name}" 산행 일정을 삭제하시겠습니까?`;
    confirm2('산행 삭제', msg, ()=>{
      D.hikes       = D.hikes.filter(x=>x.id!==id);
      D.attendances = D.attendances.filter(a=>a.hikeId!==id);
      saveData(); closeOv('ov-hike');
      renderCalendar(); renderAttendance(); renderRanking();
      toast(`"${h.name}" 산행이 삭제되었습니다.`);
    });
  });
}

function saveHike() {
  const id   = document.getElementById('hike-id').value;
  const date = document.getElementById('hike-date').value;
  const name = document.getElementById('hike-name').value.trim();
  const loc  = document.getElementById('hike-loc').value.trim();
  const level= document.getElementById('hike-lvl').value;
  const notes= document.getElementById('hike-note').value.trim();
  if(!date||!name) { toast('날짜와 산 이름을 입력하세요'); return; }
  if(!id && D.hikes.filter(h=>h.date===date).length >= 3) { toast('같은 날짜에 최대 3개까지 등록 가능합니다'); return; }
  requireAdmin(()=>{
    if (id) {
      const h = D.hikes.find(x=>x.id===id);
      Object.assign(h,{date,name,location:loc,level,notes});
    } else {
      D.hikes.push({id:uid(),date,name,location:loc,level,notes});
    }
    saveData(); closeOv('ov-hike');
    renderCalendar(); renderAttendance();
    toast('산행 일정이 저장되었습니다.');
  });
}

// ════════════════════════════════════════════════════
//  SAVINGS
// ════════════════════════════════════════════════════
function renderSavings() {
  const y = new Date().getFullYear();
  const sorted = [...D.members].sort((a,b)=>getSavingsBalance(b.id)-getSavingsBalance(a.id));
  document.getElementById('savings-list').innerHTML = sorted.map(m=>{
    const bal  = getSavingsBalance(m.id);
    const cnt  = D.attendances.filter(a=>a.memberId===m.id && a.date>=`${y}-01-01`).length;
    const canUse = bal >= 5000;
    return `<div class="sav-card">
      <div class="mem-avatar">${m.emoji}</div>
      <div class="sav-info">
        <div class="sav-name">${m.name}</div>
        <div class="sav-meta">${y}년 참석 ${cnt}회 · 올해 적립 ${won(cnt*1000)}</div>
      </div>
      <div class="sav-bal">
        <div class="sav-amount${canUse?'':' low'}">${won(bal)}</div>
        <div class="sav-usable ${canUse?'usable':'not-usable'}">${canUse?'✅ 사용가능':'🔒 잔액부족'}</div>
      </div>
      <button class="btn btn-s btn-sm" onclick="openSavingsDetail('${m.id}')">내역</button>
    </div>`;
  }).join('');
}

function openSavingsDetail(memberId) {
  const m = D.members.find(x=>x.id===memberId); if(!m) return;
  const bal = getSavingsBalance(memberId);
  const canUse = bal >= 5000;
  document.getElementById('sav-member-id').value = memberId;
  document.getElementById('sav-member-name').textContent = `${m.emoji} ${m.name} — 적립금 상세`;
  document.getElementById('sav-bal-display').textContent = won(bal);
  document.getElementById('sav-usable-display').textContent = canUse ? '5,000원 이상 — 사용 가능' : `5,000원 미만 — 사용 불가 (${5000-bal}원 부족)`;
  document.getElementById('use-amount').value = '';
  document.getElementById('use-note').value   = '';

  const hist = getSavingsHistoryFull(memberId);
  document.getElementById('sav-hist').innerHTML = hist.length ? hist.map(h=>`
    <div class="sh-row">
      <div><div class="sh-note">${h.note}</div><div class="sh-date">${fmt(h.date)}</div></div>
      <div class="sh-amt ${h.amount>0?'pos':'neg'}">${h.amount>0?'+':''}${won(h.amount)}</div>
    </div>`).join('') : '<div style="text-align:center;color:var(--sub);padding:16px;font-size:.85rem">올해 내역 없음</div>';

  openOv('ov-savings');
}

function useSavings() {
  const memberId = document.getElementById('sav-member-id').value;
  const amount   = parseInt(document.getElementById('use-amount').value);
  const note     = document.getElementById('use-note').value.trim() || '적립금 사용';
  const bal      = getSavingsBalance(memberId);
  if (!amount || amount <= 0) { toast('사용 금액을 입력하세요'); return; }
  if (amount < 1000) { toast('최소 1,000원 이상 사용 가능합니다'); return; }
  if (amount > bal) { toast(`잔액(${won(bal)})이 부족합니다`); return; }
  if (bal < 5000) { toast('잔액이 5,000원 미만이어야 합니다'); return; }
  requireAdmin(()=>{
    D.savingsUse.push({id:uid(), memberId, date:today(), amount, note});
    saveData();
    openSavingsDetail(memberId);
    renderSavings();
    toast(`${won(amount)} 사용 처리되었습니다.`);
  });
}

function yearEndReset() {
  const y = new Date().getFullYear();
  if (!D.processedYears) D.processedYears = [];
  if (D.processedYears.includes(y)) {
    toast(`${y}년은 이미 정산 완료된 연도입니다.`); return;
  }
  const active = D.members.filter(m=>getSavingsBalanceForYear(m.id,y)>0);
  if (!active.length) { toast('이월할 적립금이 없습니다.'); return; }
  requireAdmin(()=>{
    const total = active.reduce((s,m)=>s+getSavingsBalanceForYear(m.id,y),0);
    const lines = active.map(m=>`${m.name}: ${won(getSavingsBalanceForYear(m.id,y))}`).join('\n');
    confirm2(`${y}년 적립금 이월`,
      `12.31 기준 미사용 적립금을 회비로 이월합니다.\n\n${lines}\n\n합계: ${won(total)}`,
      ()=>{
        processYearEnd(y);
        saveData(); renderSavings(); renderFees();
        toast(`총 ${won(total)} 회비로 이월 완료`);
      }
    );
  });
}

// ════════════════════════════════════════════════════
//  FEES
// ════════════════════════════════════════════════════
function renderFees() {
  const total = D.fees.reduce((s,f)=>s+f.amount,0);
  const byType = {late:0, noshow:0, savings_reset:0, other:0};
  D.fees.forEach(f=>{ byType[f.type] = (byType[f.type]||0) + f.amount; });

  document.getElementById('fee-summary').innerHTML = `
    <div class="fee-stat"><div class="fs-num">${won(total)}</div><div class="fs-lbl">총 회비 합계</div></div>
    <div class="fee-stat"><div class="fs-num">${won(byType.savings_reset)}</div><div class="fs-lbl">적립금 이월</div></div>
    <div class="fee-stat"><div class="fs-num">${won(byType.late)}</div><div class="fs-lbl">지각비</div></div>
    <div class="fee-stat"><div class="fs-num">${won(byType.noshow+byType.other)}</div><div class="fs-lbl">노쇼·기타</div></div>`;

  const sorted = [...D.fees].sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('fee-list').innerHTML = sorted.map(f=>{
    const ft = FT[f.type]||{label:'기타',cls:'ft-other'};
    const mName = f.memberId ? (D.members.find(m=>m.id===f.memberId)?.name||'') : '';
    return `<div class="fee-row">
      <div class="fee-type ${ft.cls}">${ft.label}</div>
      <div class="fee-body">
        <div class="fb-note">${f.note||ft.label}${mName?' ('+mName+')':''}</div>
        <div class="fb-meta">${fmt(f.date)}</div>
      </div>
      <div class="fee-amt">${won(f.amount)}</div>
      <button class="del-btn" onclick="deleteFee('${f.id}')">✕</button>
    </div>`;
  }).join('') || '<div style="text-align:center;color:var(--sub);padding:24px;font-size:.88rem">항목이 없습니다</div>';
}

function openFee() {
  document.getElementById('fee-date').value   = today();
  document.getElementById('fee-amount').value = '';
  document.getElementById('fee-note').value   = '';
  document.getElementById('fee-type').value   = 'late';
  const sel = document.getElementById('fee-member');
  sel.innerHTML = '<option value="">— 공통 —</option>' +
    D.members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
  openOv('ov-fee');
}

function saveFee() {
  const date   = document.getElementById('fee-date').value;
  const memberId = document.getElementById('fee-member').value || null;
  const type   = document.getElementById('fee-type').value;
  const amount = parseInt(document.getElementById('fee-amount').value);
  const note   = document.getElementById('fee-note').value.trim();
  if(!date||!amount||amount<=0){ toast('날짜와 금액을 입력하세요'); return; }
  requireAdmin(()=>{
    D.fees.push({id:uid(), memberId, date, amount, type, note});
    saveData(); closeOv('ov-fee'); renderFees();
    toast('회비 항목이 추가되었습니다.');
  });
}

function deleteFee(id) {
  requireAdmin(()=>{
    confirm2('항목 삭제', '이 회비 항목을 삭제하시겠습니까?', ()=>{
      D.fees = D.fees.filter(f=>f.id!==id);
      saveData(); renderFees(); toast('삭제되었습니다.');
    });
  });
}

// ════════════════════════════════════════════════════
//  MODALS / CONFIRM
// ════════════════════════════════════════════════════
function openOv(id)  { document.getElementById(id).classList.add('on'); }
function closeOv(id, e) {
  if (e && e.target !== document.getElementById(id)) return;
  document.getElementById(id).classList.remove('on');
}

let cfCallback = null;
function confirm2(title, msg, cb) {
  document.getElementById('cf-title').textContent = title;
  document.getElementById('cf-msg').textContent = msg;
  cfCallback = cb;
  openOv('ov-confirm');
}
document.getElementById('cf-ok').onclick = ()=>{ closeOv('ov-confirm'); if(cfCallback) cfCallback(); cfCallback=null; };

// close modals on ESC
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') {
    ['ov-hike','ov-member','ov-savings','ov-fee','ov-confirm','ov-pw'].forEach(id=>{
      document.getElementById(id).classList.remove('on');
    });
    adminPending = null;
  }
});
</script>
</body>
